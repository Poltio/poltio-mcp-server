<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Connect Poltio</title><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;max-width:480px;margin:60px auto;padding:0 20px}
h1{font-size:1.4rem}
.err{color:#c00;background:#fff0f0;border:1px solid #fcc;padding:12px;border-radius:4px;margin-bottom:16px}
label{display:block;margin-bottom:4px;font-weight:600}
input[type=text]{width:100%;padding:8px;font-size:1rem;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
button{margin-top:16px;padding:10px 24px;background:#0066cc;color:#fff;border:0;border-radius:4px;font-size:1rem;cursor:pointer}
.hint{font-size:.85rem;color:#555;margin-top:8px}
</style>
</head>
<body>
<h1>Connect Poltio to Claude</h1>
{{if .ErrMsg}}<div class="err">{{.ErrMsg}}</div>{{end}}
<form method="POST" action="/consent">
<label for="token">Poltio API Token</label>
<input type="text" id="token" name="poltio_token" autocomplete="off" placeholder="Paste your Poltio token here" required>
<p class="hint">Generate a token from your <a href="https://app.poltio.com/account/tokens" target="_blank">Poltio account panel</a>.</p>
<button type="submit">Authorize</button>
</form>
</body>
</html>
